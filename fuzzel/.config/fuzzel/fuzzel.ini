[main]
font=UbuntuMono Nerd Font:size=16
dpi-aware=no
prompt="  "
placeholder="検索する..."
icon-theme=Adwaita
selection-height-offset=2
inner-pad=10
line-height=24
fields=name,generic,comment,executable
terminal=foot

[colors]
# Background: Rosé Pine Base (#191724) with ~70% alpha (b3)
background=191724b3
# Text: Rosé Pine Subtle (#908caa)
text=908caaff
# Selection: Rosé Pine Surface (#1f1d2e) with a bit more opacity
selection=1f1d2eb3
# Selection Text: Rosé Pine Text (#e0def4)
selection-text=e0def4ff
# Match: Rosé Pine Rose (#ebbcba) to highlight search hits
match=ebbcbaff
# Selection Match: Rosé Pine Gold (#f6c177) for hits in the active item
selection-match=f6c177ff
# Border: Rosé Pine Pine (#31748f) at low alpha to match tooltips
border=31748f33

[border]
width=1
radius=12
