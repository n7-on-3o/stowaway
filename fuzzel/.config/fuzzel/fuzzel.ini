[main]
# Match the font used in your Waybar
font=UbuntuMono Nerd Font:size=16
prompt="  "
placeholder="検索する..."
icon-theme=Adwaita
selection-height-offset=2
inner-pad=10
line-height=24
fields=name,generic,comment,executable
terminal=foot  # Change this to your preferred terminal

[colors]
# Background: #141414 (20,20,20) with 0.7 alpha (B3 in hex)
background=141414b3
# Text: White for unselected entries
text=999999ff
# Selection: Subtle white tint (0.1 alpha) to match your workspace hover effect
selection=ffffff1a
# Selection Text: White for the active item
selection-text=ffffffff
# Match: Pure white to highlight search hits
match=ffffffff
# Selection Match: Pure white for hits in the active item
selection-match=ffffffff
# Border: A very thin white border to match the tooltip style
border=ffffff1a

[border]
width=1
radius=8
