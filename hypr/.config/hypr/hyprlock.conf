general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = screenshot
    color = rgba(25, 23, 36, 1.0) # Rosé Pine Base
    blur_passes = 3 
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# DATE - Splash of Rose
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgba(235, 188, 186, 1.0)
  font_size = 32
  font_family = UbuntuMono Nerd Font
  position = 0, 220 
  halign = center
  valign = center
}

# TIME - Splash of Gold
label {
    monitor =
    text = $TIME12
    color = rgba(246, 193, 119, 1.0)
    font_size = 64
    font_family = UbuntuMono Nerd Font Bold
    position = 0, 100 
    halign = center
    valign = center
}

# INPUT FIELD - Splash of Pine & Foam
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    
    # Outer ring: Pine with a soft pulse logic
    outer_color = rgba(49, 116, 143, 0.8)
    inner_color = rgba(31, 29, 46, 0.7)
    font_color = rgb(156, 207, 216) # Foam
    
    fade_on_empty = true
    placeholder_text = <span foreground="##9ccfd8"><i>Password...</i></span>
    hide_input = false
    rounding = 12 # Matching Waybar Islands
    
    check_color = rgb(246, 193, 119) # Gold
    fail_color = rgb(235, 111, 146)  # Love
    
    # Position adjusted to -40 to prevent clipping
    position = 0, -40
    halign = center
    valign = center
}

# USER ICON / LABEL - Splash of Iris
label {
    monitor =
    text =   $USER
    color = rgba(196, 167, 231, 0.8)
    font_size = 16 # Increased slightly for clarity
    font_family = UbuntuMono Nerd Font
    
    # Shifted further down to -140 to ensure no overlap with input field
    position = 0, -140
    halign = center
    valign = center
}
