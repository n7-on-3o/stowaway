# BEGIN_KITTY_FONTS
font_family      family="Iosevka SS08"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

font_size 14

# --- Window Style ---
window_padding_width 20
#background_opacity 0.90
# Hide the title bar to let Niri handle the "roundy" look
hide_window_decorations yes

enable_audio_bell no

# BEGIN_KITTY_THEME
# Catppuccin-Macchiato
include current-theme.conf
# END_KITTY_THEME
