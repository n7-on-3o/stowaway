max-history=5
sort=-time

# Appearance
font=JetBrains Mono 11
width=300
height=150
margin=15
padding=15
border-size=2
border-radius=10
icons=1
max-icon-size=48

# Colors
background-color={{colors.surface.default.hex}}66
text-color={{colors.on_surface.default.hex}}ff
border-color={{colors.primary.default.hex}}99
progress-color=source {{colors.primary.default.hex}}ff

[urgency=high]
border-color={{colors.error.default.hex}}ff
default-timeout=0

[urgency=low]
default-timeout=5000
